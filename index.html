<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>CommerceFlow | Run Your Entire Commerce Business with AI</title>
    <meta name="description" content="CommerceFlow delivers an AI-powered commerce platform to manage products, track orders, monitor inventory, understand customers, and generate intelligent insights." />
    <meta name="theme-color" content="#030303" />
    <meta name="color-scheme" content="dark" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo-icon.png" />

    <!-- ─── DNS Prefetch & Preconnect for external origins ─── -->
    <!-- Eliminate DNS lookup + TLS handshake time for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- ─── LCP Preload: Logo is the Largest Contentful Paint element ─── -->
    <!-- Telling the browser to fetch this immediately, before CSS/JS parse -->
    <link
      rel="preload"
      as="image"
      href="/logo-full.png"
      fetchpriority="high"
    />

    <!-- ─── Google Fonts: non-blocking with font-display=swap ─── -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Open Graph / Social -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://commerce-flow-beige.vercel.app" />
    <meta property="og:title"       content="CommerceFlow | AI-Powered Commerce Platform" />
    <meta property="og:description" content="Manage products, track orders, monitor inventory, understand customers, and generate intelligent insights — all in one platform." />
    <meta property="og:image"       content="https://commerce-flow-beige.vercel.app/logo-full.png" />
    <meta name="twitter:card"       content="summary_large_image" />
    <meta name="twitter:image"      content="https://commerce-flow-beige.vercel.app/logo-full.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
